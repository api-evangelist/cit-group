description: >-
  CIT Group was a US financial holding company providing commercial financing,
  equipment leasing, factoring, and middle-market banking services. CIT was
  acquired by First Citizens BancShares in January 2022 and has been
  integrated into First Citizens Bank as the Commercial Banking division.
  CIT Group does not maintain a public developer portal and never published
  general-purpose REST APIs; legacy customer integrations were delivered
  through file-based ACH/wire feeds, the OneWest online banking platform,
  and partner-mediated treasury connectivity. New API-based integrations
  for the combined institution are now exposed through First Citizens Bank.
